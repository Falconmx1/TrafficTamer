<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrafficTamer Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ff00; margin-bottom: 20px; text-align: center; }
        .card {
            background: #3c3c3c;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 { color: #00ff00; margin-bottom: 15px; border-bottom: 2px solid #00ff00; display: inline-block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #00ff00;
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #00ff00;
            color: #1e1e1e;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); background: #00cc00; }
        button.danger { background: #ff4444; color: white; }
        button.danger:hover { background: #cc0000; }
        .status {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin-top: 10px;
            white-space: pre-wrap;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦾 TrafficTamer Dashboard</h1>
        
        <div class="grid-2">
            <!-- Ancho de Banda -->
            <div class="card">
                <h2>📊 Ancho de Banda</h2>
                <div class="form-group">
                    <label>Interfaz</label>
                    <input type="text" id="interface" value="eth0">
                </div>
                <div class="form-group">
                    <label>Límite (Mbps)</label>
                    <input type="number" id="bandwidth_rate" placeholder="10">
                </div>
                <button onclick="setBandwidth()">Aplicar Límite</button>
            </div>
            
            <!-- Latencia y Pérdida -->
            <div class="card">
                <h2>⏱️ Latencia / Pérdida</h2>
                <div class="form-group">
                    <label>Latencia (ms)</label>
                    <input type="number" id="delay_ms" placeholder="100">
                </div>
                <button onclick="setLatency()">Aplicar Latencia</button>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Pérdida (%)</label>
                    <input type="number" id="loss_percent" placeholder="5" step="0.1">
                </div>
                <button onclick="setLoss()">Aplicar Pérdida</button>
            </div>
            
            <!-- Avanzado -->
            <div class="card">
                <h2>⚙️ Avanzado</h2>
                <div class="form-group">
                    <label>Corrupción (%)</label>
                    <input type="number" id="corrupt_percent" placeholder="5" step="0.1">
                </div>
                <button onclick="setCorruption()">Aplicar Corrupción</button>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Jitter (ms)</label>
                    <input type="number" id="jitter_ms" placeholder="20">
                </div>
                <button onclick="setJitter()">Aplicar Jitter (requiere delay)</button>
            </div>
            
            <!-- Acciones -->
            <div class="card">
                <h2>🔄 Acciones</h2>
                <button onclick="resetAll()" class="danger">RESET TODO</button>
                <button onclick="getStatus()">Obtener Estado</button>
                <button onclick="listPolicies()">Listar Políticas</button>
            </div>
        </div>
        
        <!-- Estado -->
        <div class="card">
            <h2>📡 Estado del Sistema</h2>
            <div id="status_output" class="status">Click en "Obtener Estado"</div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000';
        
        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: {} };
            if (data) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const result = await response.json();
                document.getElementById('status_output').innerHTML = JSON.stringify(result, null, 2);
                return result;
            } catch (error) {
                document.getElementById('status_output').innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        }
        
        function setBandwidth() {
            const interface = document.getElementById('interface').value;
            const rate = document.getElementById('bandwidth_rate').value;
            apiCall('/api/bandwidth', 'POST', { interface, rate: parseInt(rate) });
        }
        
        function setLatency() {
            const interface = document.getElementById('interface').value;
            const delay = document.getElementById('delay_ms').value;
            apiCall('/api/latency', 'POST', { interface, delay: parseInt(delay) });
        }
        
        function setLoss() {
            const interface = document.getElementById('interface').value;
            const loss = document.getElementById('loss_percent').value;
            apiCall('/api/loss', 'POST', { interface, loss: parseFloat(loss) });
        }
        
        function setCorruption() {
            const interface = document.getElementById('interface').value;
            const corrupt = document.getElementById('corrupt_percent').value;
            apiCall('/api/corruption', 'POST', { interface, corrupt: parseFloat(corrupt) });
        }
        
        function setJitter() {
            alert('Jitter requiere delay base. Primero aplica latencia con --delay');
        }
        
        function resetAll() {
            if (confirm('¿Resetear todas las reglas de tráfico?')) {
                const interface = document.getElementById('interface').value;
                apiCall('/api/reset', 'POST', { interface });
            }
        }
        
        function getStatus() {
            const interface = document.getElementById('interface').value;
            apiCall(`/api/status?interface=${interface}`);
        }
        
        function listPolicies() {
            apiCall('/api/policies');
        }
        
        // Auto-refresh cada 5 segundos
        // setInterval(getStatus, 5000);
    </script>
</body>
</html>
